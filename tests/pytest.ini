[pytest]
# Pytest configuration for ontology-guided requirement discovery tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

# Markers for categorizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interaction
    4w: Tests for 4W analysis functionality
    complementary: Tests for complementary rules detection
    crud: Tests for CRUD completeness checking
    parser: Tests for requirement parser
    report: Tests for discovery report generation
    performance: Performance and load tests
    edge_case: Edge case and error handling tests

# Test paths
testpaths = tests


# Minimum Python version
minversion = 3.8